<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmolClaw — Personal AI agent on Telegram</title>
<meta name="description" content="Self-hosted personal AI agent on Telegram, powered by Claude. Install in one command.">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f97316;
    --link: #58a6ff;
    --code-bg: #1c2128;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    background: rgba(13, 17, 23, 0.85);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text);
    text-decoration: none;
  }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.875rem;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--accent) !important;
    color: var(--bg) !important;
    padding: 0.35rem 0.9rem;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.8rem !important;
  }

  /* CONTENT */
  .content {
    max-width: 980px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .content h1 {
    font-size: 2rem;
    font-weight: 700;
    margin: 0 0 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }
  .content h2 {
    font-size: 1.5rem;
    font-weight: 600;
    margin: 2rem 0 0.75rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }
  .content h3 {
    font-size: 1.25rem;
    font-weight: 600;
    margin: 1.5rem 0 0.5rem;
  }
  .content p { margin: 0 0 1rem; }
  .content a { color: var(--link); text-decoration: none; }
  .content a:hover { text-decoration: underline; }
  .content strong { font-weight: 600; }

  .content ul, .content ol {
    padding-left: 2rem;
    margin: 0 0 1rem;
  }
  .content li { margin: 0.25rem 0; }
  .content li + li { margin-top: 0.25rem; }

  .content code {
    background: var(--code-bg);
    padding: 0.2em 0.4em;
    border-radius: 6px;
    font-size: 0.85em;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  .content pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
    margin: 0 0 1rem;
    line-height: 1.5;
  }
  .content pre code {
    background: none;
    padding: 0;
    font-size: 0.85rem;
  }

  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 1rem;
  }
  .content th, .content td {
    border: 1px solid var(--border);
    padding: 0.5rem 0.75rem;
    text-align: left;
  }
  .content th {
    background: var(--surface);
    font-weight: 600;
  }

  .content blockquote {
    border-left: 4px solid var(--border);
    padding: 0 1rem;
    color: var(--muted);
    margin: 0 0 1rem;
  }

  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .content details {
    margin: 0 0 1rem;
  }
  .content summary {
    cursor: pointer;
    font-weight: 600;
  }

  .content img {
    max-width: 100%;
    height: auto;
  }

  .content p:has(> a > img) {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 1.2rem;
    height: 1.2rem;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 768px) {
    .nav-links a:not(.nav-cta) { display: none; }
    .content { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo"><span>&#9679;</span> smolclaw</a>
    <div class="nav-links">
      <a href="https://pypi.org/project/smolclaw/">PyPI</a>
      <a href="https://github.com/saikatkumardey/smolclaw" class="nav-cta">GitHub</a>
    </div>
  </div>
</nav>

<div class="content">
  <div class="loading" id="loading">Loading</div>
</div>

<footer>
  <p>Built by <a href="https://saikatkumardey.com">Saikat Kumar Dey</a>. MIT License.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const README_URL = 'https://raw.githubusercontent.com/saikatkumardey/smolclaw/main/README.md';

const renderer = new marked.Renderer();
renderer.heading = function({tokens, depth}) {
  const text = this.parser.parseInline(tokens);
  const raw = tokens.map(t => t.raw || t.text || '').join('');
  const id = raw.toLowerCase().replace(/[^\w]+/g, '-').replace(/(^-|-$)/g, '');
  return `<h${depth} id="${id}">${text}</h${depth}>`;
};
marked.use({renderer});

async function loadReadme() {
  const container = document.querySelector('.content');
  try {
    const res = await fetch(README_URL);
    if (!res.ok) throw new Error(res.status);
    const md = await res.text();
    container.innerHTML = marked.parse(md);
  } catch (e) {
    container.innerHTML =
      '<p style="text-align:center;color:var(--muted);padding:4rem 0;">' +
      'Could not load README. <a href="https://github.com/saikatkumardey/smolclaw">View on GitHub</a></p>';
  }
}
loadReadme();
</script>

</body>
</html>
