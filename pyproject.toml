[project]
name = "smolclaw"
version = "0.1.0"
description = "Self-hosted Telegram AI agent. Tool-call loop, SQLite history, 6 tools, skills, cron delivery."
readme = "README.md"
requires-python = ">=3.12"
authors = [{name = "Saikat Kumar Dey", email = "deysaikatkumar@gmail.com"}]
dependencies = [
    "python-telegram-bot>=20.0",
    "litellm>=1.0.0",
    "apscheduler>=3.10.0",
    "trafilatura>=1.8.0",
    "requests>=2.32.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0",
]

[project.scripts]
smolclaw = "smolclaw.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["smolclaw"]

[dependency-groups]
dev = [
    "pytest>=7.0",
]
