<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="860" height="1134"
     viewBox="0 0 860 1134">
  <style>
  @keyframes type-c0 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c0 {
    clip-path: inset(0 100% 0 0);
    animation: type-c0 0.300s steps(9, end) 0.500s forwards;
  }

  @keyframes type-cmd1 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-cmd1 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd1 2.133s steps(64, end) 1.400s forwards;
  }

  @keyframes blink-cmd1 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor-cmd1 {
    opacity: 0;
    animation:
      blink-cmd1 0.6s step-end 1.400s 4,
      fade-cmd1-out 0.01s linear 3.533s forwards;
  }
  @keyframes fade-cmd1-out {
    to { opacity: 0; }
  }

  @keyframes fade-out2 {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-out2 {
    opacity: 0;
    animation: fade-out2 0.40s ease 3.533s forwards;
  }

  @keyframes type-c3 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c3 {
    clip-path: inset(0 100% 0 0);
    animation: type-c3 1.100s steps(33, end) 4.233s forwards;
  }

  @keyframes type-cmd4 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-cmd4 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd4 0.533s steps(16, end) 5.933s forwards;
  }

  @keyframes blink-cmd4 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor-cmd4 {
    opacity: 0;
    animation:
      blink-cmd4 0.6s step-end 5.933s 1,
      fade-cmd4-out 0.01s linear 6.467s forwards;
  }
  @keyframes fade-cmd4-out {
    to { opacity: 0; }
  }

  @keyframes fade-out5 {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-out5 {
    opacity: 0;
    animation: fade-out5 0.40s ease 6.467s forwards;
  }

  @keyframes type-c6 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c6 {
    clip-path: inset(0 100% 0 0);
    animation: type-c6 0.500s steps(15, end) 7.167s forwards;
  }

  @keyframes type-cmd7 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-cmd7 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd7 0.533s steps(16, end) 8.267s forwards;
  }

  @keyframes blink-cmd7 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor-cmd7 {
    opacity: 0;
    animation:
      blink-cmd7 0.6s step-end 8.267s 1,
      fade-cmd7-out 0.01s linear 8.800s forwards;
  }
  @keyframes fade-cmd7-out {
    to { opacity: 0; }
  }

  @keyframes fade-out8 {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-out8 {
    opacity: 0;
    animation: fade-out8 0.40s ease 8.800s forwards;
  }

  @keyframes type-c9 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c9 {
    clip-path: inset(0 100% 0 0);
    animation: type-c9 1.333s steps(40, end) 9.500s forwards;
  }

  @keyframes type-c10 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c10 {
    clip-path: inset(0 100% 0 0);
    animation: type-c10 1.000s steps(30, end) 11.433s forwards;
  }

  @keyframes type-c11 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c11 {
    clip-path: inset(0 100% 0 0);
    animation: type-c11 1.767s steps(53, end) 13.033s forwards;
  }

  @keyframes type-c12 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c12 {
    clip-path: inset(0 100% 0 0);
    animation: type-c12 1.200s steps(36, end) 15.400s forwards;
  }

  @keyframes type-c13 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 -2px 0 0); }
  }
  .type-c13 {
    clip-path: inset(0 100% 0 0);
    animation: type-c13 1.033s steps(31, end) 17.200s forwards;
  }

  </style>
  <!-- Window frame -->
  <rect x="0" y="0" width="860" height="1134"
        rx="8" ry="8" fill="#1e1e1e" />
    <!-- Title bar -->
    <rect x="0" y="0" width="860" height="38"
          rx="8" ry="8" fill="#323233" />
    <rect x="0" y="30" width="860" height="8"
          fill="#323233" />
    <circle cx="16" cy="19" r="6" fill="#ff5f57" />
    <circle cx="36" cy="19" r="6" fill="#febc2e" />
    <circle cx="56" cy="19" r="6" fill="#28c840" />
    <text x="430" y="24" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#d4d4d4" opacity="0.7" text-anchor="middle" dominant-baseline="middle">smolclaw</text>
  <!-- Terminal body -->
  <clipPath id="body-clip">
    <rect x="0" y="38" width="860" height="1096" />
  </clipPath>
  <g clip-path="url(#body-clip)">
    <text x="20" y="80" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c0"># Install</text>
    <text x="20" y="124" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd1"><tspan fill="#4ec9b0">$ </tspan><tspan fill="#d4d4d4">uv tool install git+https://github.com/saikatkumardey/smolclaw</tspan></text>
    <rect x="566.6" y="110" width="8.5" height="16" fill="#d4d4d4" opacity="0.7" class="cursor-cmd1" />
    <text x="20" y="146" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out2">Resolved 24 packages in 1.1s</text>
    <text x="20" y="168" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out2">Installed smolclaw 0.2.0</text>
    <text x="20" y="212" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c3"># Run the setup wizard (one-time)</text>
    <text x="20" y="256" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd4"><tspan fill="#4ec9b0">$ </tspan><tspan fill="#d4d4d4">smolclaw setup</tspan></text>
    <rect x="156.6" y="242" width="8.5" height="16" fill="#d4d4d4" opacity="0.7" class="cursor-cmd4" />
    <text x="20" y="278" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">── Step 1/3 — Telegram Bot Token ─────────────────────</text>
    <text x="20" y="300" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="322" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  Paste your bot token (hidden): ************************</text>
    <text x="20" y="344" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  Validating token with Telegram…</text>
    <text x="20" y="366" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  ✓  Bot validated: @my_smolclaw_bot</text>
    <text x="20" y="388" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="410" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">── Step 2/3 — Your Telegram User ID ──────────────────</text>
    <text x="20" y="432" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="454" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  Your Telegram user ID: 987654321</text>
    <text x="20" y="476" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  ✓  User ID set: 987654321</text>
    <text x="20" y="498" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="520" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">── Step 3/3 — Claude Authentication ──────────────────</text>
    <text x="20" y="542" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="564" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  ❯ Paste an API key</text>
    <text x="20" y="586" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">    Login with Claude account (opens browser)</text>
    <text x="20" y="608" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="630" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  Paste your ANTHROPIC_API_KEY (hidden): ******************</text>
    <text x="20" y="652" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  ✓  API key saved.</text>
    <text x="20" y="674" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="696" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">╭─────────────────────────────────────────╮</text>
    <text x="20" y="718" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">│  ✓  Setup Complete  (~/.smolclaw/.env)  │</text>
    <text x="20" y="740" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">╰─────────────────────────────────────────╯</text>
    <text x="20" y="762" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5"></text>
    <text x="20" y="784" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">  Start your agent:  smolclaw start</text>
    <text x="20" y="828" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c6"># Start the bot</text>
    <text x="20" y="872" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd7"><tspan fill="#4ec9b0">$ </tspan><tspan fill="#d4d4d4">smolclaw start</tspan></text>
    <rect x="156.6" y="858" width="8.5" height="16" fill="#d4d4d4" opacity="0.7" class="cursor-cmd7" />
    <text x="20" y="894" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out8">12:00:01 | INFO    | smolclaw.main - SmolClaw running.</text>
    <text x="20" y="938" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c9"># Bot is live — open Telegram and say hi</text>
    <text x="20" y="982" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c10"># /status shows current config</text>
    <text x="20" y="1026" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c11"># /models lets you switch between Opus, Sonnet, Haiku</text>
    <text x="20" y="1070" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c12"># /reset clears conversation history</text>
    <text x="20" y="1114" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c13"># /restart restarts the process</text>
  </g>
</svg>
