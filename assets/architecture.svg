<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6c7086"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="450" y="37" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#cdd6f4">smolclaw architecture</text>
  <text x="450" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#585b70">self-hosted Telegram AI agent</text>

  <!-- Title separator -->
  <line x1="60" y1="66" x2="840" y2="66" stroke="#313244" stroke-width="1"/>

  <!-- ── Group backgrounds ── -->

  <!-- Entry Points group -->
  <rect x="18" y="78" width="168" height="214" rx="10" fill="#94e2d5" opacity="0.07"/>

  <!-- Core group -->
  <rect x="196" y="78" width="438" height="214" rx="10" fill="#89b4fa" opacity="0.06"/>

  <!-- Model group -->
  <rect x="648" y="78" width="234" height="214" rx="10" fill="#cba6f7" opacity="0.07"/>

  <!-- Tools group -->
  <rect x="108" y="286" width="668" height="110" rx="10" fill="#a6e3a1" opacity="0.06"/>

  <!-- Storage group -->
  <rect x="260" y="402" width="372" height="120" rx="10" fill="#f9e2af" opacity="0.07"/>

  <!-- Group labels -->
  <text x="102" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#94e2d5" opacity="0.45" letter-spacing="1.2">ENTRY</text>
  <text x="415" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#89b4fa" opacity="0.45" letter-spacing="1.2">CORE</text>
  <text x="765" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#cba6f7" opacity="0.45" letter-spacing="1.2">MODEL</text>
  <text x="442" y="299" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#a6e3a1" opacity="0.45" letter-spacing="1.2">TOOLS</text>
  <text x="446" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#f9e2af" opacity="0.45" letter-spacing="1.2">WORKSPACE / STORAGE</text>

  <!-- ── Boxes ── -->

  <!-- Telegram User (teal) -->
  <rect x="28" y="98" width="148" height="62" rx="8" fill="#94e2d5" fill-opacity="0.13" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="102" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#94e2d5">Telegram User</text>
  <text x="102" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94e2d5" opacity="0.65">sends messages</text>

  <!-- APScheduler (teal) -->
  <rect x="28" y="204" width="148" height="62" rx="8" fill="#94e2d5" fill-opacity="0.13" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="102" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#94e2d5">APScheduler</text>
  <text x="102" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94e2d5" opacity="0.65">fires cron jobs</text>

  <!-- main.py (blue) -->
  <rect x="206" y="130" width="180" height="68" rx="8" fill="#89b4fa" fill-opacity="0.13" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="296" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#89b4fa">main.py</text>
  <text x="296" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#89b4fa" opacity="0.65">Bot handler + Scheduler</text>

  <!-- smolclaw Agent (blue, larger) -->
  <rect x="432" y="108" width="196" height="92" rx="8" fill="#89b4fa" fill-opacity="0.13" stroke="#89b4fa" stroke-width="2"/>
  <text x="530" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#89b4fa">smolclaw Agent</text>
  <text x="530" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#89b4fa" opacity="0.65">ToolCallingAgent</text>
  <text x="530" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#89b4fa" opacity="0.65">smolagents + LiteLLMModel</text>

  <!-- LiteLLM Model (purple) -->
  <rect x="658" y="98" width="212" height="96" rx="8" fill="#cba6f7" fill-opacity="0.13" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="764" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#cba6f7">LiteLLM Model</text>
  <text x="764" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cba6f7" opacity="0.65">Anthropic · OpenAI</text>
  <text x="764" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cba6f7" opacity="0.65">Groq · Ollama</text>

  <!-- Built-in Tools (green) -->
  <rect x="118" y="304" width="186" height="80" rx="8" fill="#a6e3a1" fill-opacity="0.13" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="211" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#a6e3a1">Built-in Tools</text>
  <text x="211" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a6e3a1" opacity="0.65">shell · web · file · wiki</text>
  <text x="211" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a6e3a1" opacity="0.65">python · telegram_send</text>

  <!-- Custom Tools (green) -->
  <rect x="358" y="304" width="186" height="80" rx="8" fill="#a6e3a1" fill-opacity="0.13" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="451" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#a6e3a1">Custom Tools</text>
  <text x="451" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a6e3a1" opacity="0.65">tools/*.py</text>
  <text x="451" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a6e3a1" opacity="0.65">user-built · dynamic</text>

  <!-- MCP Servers (green) -->
  <rect x="594" y="304" width="186" height="80" rx="8" fill="#a6e3a1" fill-opacity="0.13" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="687" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#a6e3a1">MCP Servers</text>
  <text x="687" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a6e3a1" opacity="0.65">mcp_servers.yaml</text>
  <text x="687" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a6e3a1" opacity="0.65">connected at startup</text>

  <!-- Workspace / Memory (yellow) -->
  <rect x="270" y="422" width="352" height="90" rx="8" fill="#f9e2af" fill-opacity="0.13" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="446" y="449" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f9e2af">Workspace / Memory</text>
  <text x="446" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f9e2af" opacity="0.65">SOUL · USER · MEMORY · AGENTS · skills/</text>
  <text x="446" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f9e2af" opacity="0.65">smolclaw.db · handover.md</text>

  <!-- ── Arrows ── -->

  <!-- Telegram User → main.py (diagonal) -->
  <path d="M 176,129 L 206,154" stroke="#6c7086" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>

  <!-- APScheduler → main.py (diagonal up-right) -->
  <path d="M 176,235 L 206,176" stroke="#6c7086" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>

  <!-- main.py → smolclaw Agent -->
  <path d="M 386,164 L 432,155" stroke="#6c7086" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>

  <!-- smolclaw Agent → LiteLLM Model -->
  <path d="M 628,154 L 658,146" stroke="#6c7086" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>

  <!-- smolclaw Agent → 3 Tools (fan-out) -->
  <!-- Vertical stem from agent bottom -->
  <line x1="530" y1="200" x2="530" y2="262" stroke="#6c7086" stroke-width="1.5"/>
  <!-- Horizontal branch bar -->
  <line x1="211" y1="262" x2="687" y2="262" stroke="#6c7086" stroke-width="1.5"/>
  <!-- Down to Built-in Tools -->
  <line x1="211" y1="262" x2="211" y2="304" stroke="#6c7086" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- Down to Custom Tools -->
  <line x1="451" y1="262" x2="451" y2="304" stroke="#6c7086" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- Down to MCP Servers -->
  <line x1="687" y1="262" x2="687" y2="304" stroke="#6c7086" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Tools → Workspace / Memory (dashed, context r/w) -->
  <path d="M 451,384 L 446,422" stroke="#6c7086" stroke-width="1.4" stroke-dasharray="5,3" fill="none" marker-end="url(#ah)"/>
  <text x="462" y="408" font-family="system-ui, sans-serif" font-size="9" fill="#585b70">r/w context</text>

</svg>
