name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build binary (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies + PyInstaller
        run: uv sync && uv pip install pyinstaller

      - name: Build binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name smolclaw \
            --hidden-import smolclaw \
            --collect-all smolclaw \
            --collect-all claude_agent_sdk \
            smolclaw/main.py

      - name: Rename binary
        run: |
          mv dist/smolclaw dist/smolclaw-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smolclaw-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/smolclaw-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/smolclaw-*
          generate_release_notes: true
