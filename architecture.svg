<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b45309"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="680" fill="#fafafa"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">SmolClaw Architecture</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 1: Entry points                            -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Telegram User -->
  <rect x="30" y="55" width="140" height="50" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">Telegram</text>
  <text x="100" y="93" text-anchor="middle" font-size="12" fill="#1e3a8a">User</text>

  <!-- main.py -->
  <rect x="220" y="55" width="150" height="50" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <text x="295" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">main.py</text>
  <text x="295" y="93" text-anchor="middle" font-size="12" fill="#1e3a8a">CLI · bot setup</text>

  <!-- handlers.py -->
  <rect x="420" y="55" width="160" height="50" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">handlers.py</text>
  <text x="500" y="93" text-anchor="middle" font-size="12" fill="#1e3a8a">commands · messages</text>

  <!-- scheduler.py -->
  <rect x="220" y="145" width="150" height="50" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <text x="295" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">scheduler.py</text>
  <text x="295" y="183" text-anchor="middle" font-size="12" fill="#1e3a8a">APScheduler crons</text>

  <!-- Arrows: entry -->
  <line x1="170" y1="80" x2="220" y2="80" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="370" y1="80" x2="420" y2="80" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- scheduler → handlers (dashed) -->
  <path d="M295 195 Q295 230 500 230 Q500 230 500 105" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="390" y="245" text-anchor="middle" font-size="11" fill="#2563eb">cron prompt</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 2: agent.py (core)                         -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- agent.py box -->
  <rect x="340" y="290" width="320" height="60" rx="8" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="500" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b0764">agent.py</text>
  <text x="500" y="336" text-anchor="middle" font-size="12" fill="#4c1d95">_Session · run() · per-chat lock</text>

  <!-- handlers → agent -->
  <line x1="500" y1="105" x2="500" y2="290" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="514" y="200" font-size="11" fill="#7c3aed">agent.run()</text>

  <!-- ── agent internals row ── -->

  <!-- system_prompt -->
  <rect x="30" y="400" width="190" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="125" y="422" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b0764">_system_prompt()</text>
  <text x="125" y="440" text-anchor="middle" font-size="11" fill="#4c1d95">SOUL · USER · MEMORY</text>
  <text x="125" y="455" text-anchor="middle" font-size="11" fill="#4c1d95">+ Skills  (on client create)</text>

  <!-- claude-agent-sdk -->
  <rect x="250" y="400" width="190" height="60" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="345" y="422" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a044e">claude-agent-sdk</text>
  <text x="345" y="440" text-anchor="middle" font-size="11" fill="#4a044e">ClaudeSDKClient</text>
  <text x="345" y="455" text-anchor="middle" font-size="11" fill="#4a044e">query() · max 10 turns</text>

  <!-- config.py -->
  <rect x="470" y="400" width="150" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="545" y="422" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b0764">config.py</text>
  <text x="545" y="440" text-anchor="middle" font-size="11" fill="#4c1d95">model · effort</text>
  <text x="545" y="455" text-anchor="middle" font-size="11" fill="#4c1d95">max_turns</text>

  <!-- session_state.py -->
  <rect x="650" y="400" width="160" height="60" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="730" y="422" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">session_state.py</text>
  <text x="730" y="440" text-anchor="middle" font-size="11" fill="#134e4a">token usage</text>
  <text x="730" y="455" text-anchor="middle" font-size="11" fill="#134e4a">daily tracking</text>

  <!-- handover.py -->
  <rect x="840" y="400" width="140" height="60" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="910" y="422" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">handover.py</text>
  <text x="910" y="440" text-anchor="middle" font-size="11" fill="#134e4a">state across</text>
  <text x="910" y="455" text-anchor="middle" font-size="11" fill="#134e4a">restarts</text>

  <!-- agent → internals -->
  <line x1="420" y1="350" x2="170" y2="400" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="460" y1="350" x2="360" y2="400" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="520" y1="350" x2="540" y2="400" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <line x1="580" y1="350" x2="710" y2="400" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <line x1="600" y1="350" x2="890" y2="400" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 3: Tool groups                             -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Built-in tools -->
  <rect x="30" y="530" width="190" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="125" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Built-in tools</text>
  <text x="125" y="572" text-anchor="middle" font-size="12" fill="#166534">Bash · Read · Write</text>
  <text x="125" y="590" text-anchor="middle" font-size="12" fill="#166534">WebSearch · WebFetch</text>
  <text x="125" y="608" text-anchor="middle" font-size="11" fill="#166534">(claude-agent-sdk native)</text>
  <text x="125" y="626" text-anchor="middle" font-size="11" fill="#166534">cwd = ~/.smolclaw</text>

  <!-- MCP: smolclaw tools -->
  <rect x="250" y="530" width="200" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="350" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">MCP: smolclaw</text>
  <text x="350" y="572" text-anchor="middle" font-size="12" fill="#166534">telegram_send</text>
  <text x="350" y="590" text-anchor="middle" font-size="12" fill="#166534">save_handover · self_restart</text>
  <text x="350" y="608" text-anchor="middle" font-size="12" fill="#166534">self_update · spawn_task</text>
  <text x="350" y="626" text-anchor="middle" font-size="11" fill="#166534">(tools_sdk.py)</text>

  <!-- MCP: dynamic tools -->
  <rect x="480" y="530" width="200" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="580" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">MCP: dynamic</text>
  <text x="580" y="572" text-anchor="middle" font-size="12" fill="#166534">tools/*.py</text>
  <text x="580" y="590" text-anchor="middle" font-size="12" fill="#166534">SCHEMA + execute()</text>
  <text x="580" y="608" text-anchor="middle" font-size="12" fill="#166534">hot-reload, no restart</text>
  <text x="580" y="626" text-anchor="middle" font-size="11" fill="#166534">(tool_loader.py)</text>

  <!-- Workspace files -->
  <rect x="710" y="530" width="260" height="110" rx="8" fill="#fef9c3" stroke="#b45309" stroke-width="2"/>
  <text x="840" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">~/.smolclaw/</text>
  <text x="840" y="572" text-anchor="middle" font-size="12" fill="#92400e">SOUL.md · USER.md · MEMORY.md</text>
  <text x="840" y="590" text-anchor="middle" font-size="12" fill="#92400e">crons.yaml · skills/ · tools/</text>
  <text x="840" y="608" text-anchor="middle" font-size="12" fill="#92400e">handover.md · smolclaw.json</text>
  <text x="840" y="626" text-anchor="middle" font-size="12" fill="#92400e">sessions/*.jsonl · .env</text>

  <!-- sdk → tools -->
  <line x1="345" y1="460" x2="125" y2="530" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="345" y1="460" x2="350" y2="530" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="345" y1="460" x2="560" y2="530" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="500" text-anchor="middle" font-size="11" fill="#16a34a">allowed_tools</text>

  <!-- workspace read arrows -->
  <line x1="125" y1="460" x2="790" y2="540" stroke="#b45309" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
  <line x1="730" y1="460" x2="810" y2="530" stroke="#b45309" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
  <line x1="910" y1="460" x2="880" y2="530" stroke="#b45309" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
  <text x="870" y="500" text-anchor="middle" font-size="11" fill="#b45309">reads / writes</text>

</svg>
